app = "karanka-multiverse-ai"
primary_region = "iad"

[env]
  PORT = "8080"
  PYTHONUNBUFFERED = "1"

[build]
  builder = "paketobuildpacks/builder:base"

[http_service]
  internal_port = 8080
  force_https = true
  
  [[http_service.checks]]
    interval = "10s"
    timeout = "2s"
    method = "GET"
    path = "/health"
