services:
  - type: web
    name: karanka-multiverse-ai
    runtime: docker
    region: oregon
    healthCheckPath: /ping
    autoDeploy: true
services:
  - type: web
    name: karanka-multiverse-ai
    runtime: python
    region: oregon  # Optional: choose closest region
    buildCommand: |
      pip install --upgrade pip
      pip install setuptools wheel
      pip install -r requirements.txt
    startCommand: gunicorn -k eventlet -w 1 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PIP_NO_CACHE_DIR
        value: 1
    healthCheckPath: /ping
    autoDeploy: true
