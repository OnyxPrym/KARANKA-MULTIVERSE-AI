services:
  - type: web
    name: karanka-multiverse-ai
    runtime: python
    region: oregon
    buildCommand: |
      pip install --upgrade pip
      pip install setuptools wheel
      pip install -r requirements.txt
    startCommand: gunicorn -k eventlet -w 1 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.9.18
    healthCheckPath: /ping
    autoDeploy: true
