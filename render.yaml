services:
  - type: web
    name: karanka-multiverse-ai
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k eventlet -w 1 app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0  # Explicitly set Python version
    healthCheckPath: /ping
    autoDeploy: true
